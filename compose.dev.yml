# Dev backend: PocketBase only, no bundled SPA. Run the frontend separately with
# `pnpm dev` (vite, HMR) and point it at http://localhost:8090. Builds the
# lightweight `server` stage, so there's no Node/SPA build step.
#
#   docker compose -f compose.dev.yml up -d --build
#
# Shares the `pb_data` volume with the production compose (same project), so your
# local data is the same whether you run this or the full bundled image.
services:
  pocketbase:
    build:
      context: .
      dockerfile: Dockerfile
      target: server
      args:
        PB_VERSION: '0.39.7'
    restart: unless-stopped
    ports:
      - '8090:8090'
    volumes:
      - pb_data:/pb_data

volumes:
  pb_data:
