services:
  pocketbase:
    build:
      # Repo root, so the image can build the SPA and bake it into pb_public.
      context: .
      dockerfile: Dockerfile
      args:
        PB_VERSION: '0.39.7'
    restart: unless-stopped
    ports:
      - '8090:8090'
    volumes:
      - pb_data:/pb_data

volumes:
  pb_data:
