name: Release

# Manual, one-button release. Click "Run workflow" in the Actions tab and it:
#   1. computes the next CalVer version (YYYY.M.N, mise-style) from existing tags
#   2. creates the git tag + a DRAFT GitHub Release with auto-generated notes
#   3. builds the macOS bundles (Apple Silicon + Intel) and attaches them
#   4. builds the multi-arch Docker image and pushes it to GHCR
#   5. publishes the release once everything above succeeds
#
# A failed build leaves the release as a draft, so nothing half-baked goes public.

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version override (leave blank to auto-compute YYYY.M.N)'
        required: false
        type: string

permissions:
  contents: write # create tags / releases and upload assets
  packages: write # push the image to GHCR

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  # ── 1. Work out the version and open a draft release ────────────────────────
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      release_id: ${{ steps.release.outputs.release_id }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # need full history + tags to compute the next index
          fetch-tags: true

      - name: Compute version
        id: version
        run: |
          set -euo pipefail
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            YEAR=$(date -u +%Y)
            MONTH=$(date -u +%-m) # no leading zero, e.g. "7" not "07"
            PREFIX="${YEAR}.${MONTH}."
            LAST=$(git tag -l "${PREFIX}*" | sed "s|^${PREFIX}||" | grep -E '^[0-9]+$' | sort -n | tail -n1 || true)
            if [ -z "$LAST" ]; then NEXT=0; else NEXT=$((LAST + 1)); fi
            VERSION="${YEAR}.${MONTH}.${NEXT}"
          fi
          echo "Releasing ${VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create draft release
        id: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${{ steps.version.outputs.version }}"
          gh release create "$TAG" \
            --draft \
            --title "$TAG" \
            --generate-notes \
            --target "$GITHUB_SHA"
          RELEASE_ID=$(gh release view "$TAG" --json databaseId --jq '.databaseId')
          echo "release_id=${RELEASE_ID}" >> "$GITHUB_OUTPUT"

  # ── 2. Build the macOS desktop bundles ──────────────────────────────────────
  tauri-macos:
    needs: prepare
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin # Apple Silicon
          - target: x86_64-apple-darwin # Intel
    steps:
      - uses: actions/checkout@v7

      - name: Stamp release version into tauri.conf.json
        run: |
          set -euo pipefail
          tmp=$(mktemp)
          jq --arg v "${{ needs.prepare.outputs.version }}" '.version = $v' \
            src-tauri/tauri.conf.json > "$tmp"
          mv "$tmp" src-tauri/tauri.conf.json

      - uses: pnpm/action-setup@v6
        with:
          version: 11.13.1 # matches devEngines.packageManager in package.json

      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm

      - name: Install Rust toolchain + target
        run: |
          # rust-toolchain.toml pins the channel; `rustup show` installs it,
          # then the target is added to that same (overridden) toolchain.
          rustup show
          rustup target add ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and upload bundle
        uses: tauri-apps/tauri-action@action-v1.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ needs.prepare.outputs.release_id }}
          args: --target ${{ matrix.target }}

  # ── 3. Build and push the multi-arch Docker image to GHCR ───────────────────
  docker:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-qemu-action@v4 # emulation for the arm64 build
      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            PB_VERSION=0.39.7
          tags: |
            ${{ env.IMAGE }}:${{ needs.prepare.outputs.version }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 4. Publish the release once every build succeeded ───────────────────────
  publish:
    needs: [prepare, tauri-macos, docker]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Un-draft the release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "${{ needs.prepare.outputs.version }}" --draft=false
